name: Publish fork release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  verify:
    if: github.repository == 'phall1/ghui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run package:smoke

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"

  standalone:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: linux-x64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build:standalone -- ${{ matrix.target }}

      - name: Upload standalone release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/release/ghui-${{ matrix.target }}.tar.gz" "dist/release/ghui-${{ matrix.target }}.tar.gz.sha256" --clobber

  update-homebrew:
    needs: standalone
    runs-on: ubuntu-latest
    steps:
      - name: Download standalone checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/release
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern "*.sha256" --dir dist/release

      - name: Update phall1 Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          : "${GH_TOKEN:?Set HOMEBREW_TAP_TOKEN with access to phall1/homebrew-tap}"
          cat dist/release/*.sha256 > dist/release/checksums.txt
          checksum() {
            awk -v file="$1" '$2 == file { print $1 }' dist/release/checksums.txt
          }
          gh api --method POST repos/phall1/homebrew-tap/dispatches \
            -f event_type=ghui-release \
            -f client_payload[tag]="${GITHUB_REF_NAME}" \
            -f client_payload[version]="${GITHUB_REF_NAME#v}" \
            -f client_payload[darwin_arm64_sha256]="$(checksum ghui-darwin-arm64.tar.gz)" \
            -f client_payload[darwin_x64_sha256]="$(checksum ghui-darwin-x64.tar.gz)" \
            -f client_payload[linux_arm64_sha256]="$(checksum ghui-linux-arm64.tar.gz)" \
            -f client_payload[linux_x64_sha256]="$(checksum ghui-linux-x64.tar.gz)"
